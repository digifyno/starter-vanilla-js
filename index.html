<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Assistant</title>
    <meta name="description" content="AI chat assistant powered by RSI AI Hub.">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://rsi.digify.no ws://localhost:*;">
  </head>
  <body>
    <div id="app">
      <main class="container">
        <div class="card">
          <div class="header">
            <h1>AI Assistant</h1>
            <p class="subtitle">Powered by RSI AI Hub</p>
          </div>
          <div class="content">
            <div id="messages" role="log" aria-live="polite" aria-label="Chat messages"></div>
            <div class="input-row">
              <input id="userInput" type="text" placeholder="Ask me anything..." aria-label="Your message" />
              <button id="sendBtn" class="btn" type="button">Send</button>
            </div>
            <div id="status" role="status" aria-live="polite"></div>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
